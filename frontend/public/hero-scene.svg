<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- soft background -->
  <rect x="0" y="0" width="1200" height="560" fill="url(#g1)"/>
  <circle cx="220" cy="130" r="170" fill="#60a5fa" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="1020" cy="180" r="220" fill="#a78bfa" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="820" cy="510" r="180" fill="#22c55e" fill-opacity="0.10" filter="url(#blur)"/>

  <!-- UI frame -->
  <g transform="translate(140 110)">
    <rect x="0" y="0" width="920" height="340" rx="28" fill="#ffffff" fill-opacity="0.65" stroke="#94a3b8" stroke-opacity="0.45"/>

    <!-- product cards -->
    <g transform="translate(70 72)">
      <rect x="0" y="0" width="250" height="120" rx="18" fill="#ffffff" fill-opacity="0.75" stroke="#94a3b8" stroke-opacity="0.45"/>
      <rect x="20" y="20" width="78" height="78" rx="14" fill="url(#g2)" fill-opacity="0.55"/>
      <rect x="112" y="28" width="110" height="10" rx="5" fill="#334155" fill-opacity="0.55"/>
      <rect x="112" y="52" width="92" height="10" rx="5" fill="#334155" fill-opacity="0.35"/>
      <rect x="112" y="76" width="70" height="10" rx="5" fill="#334155" fill-opacity="0.28"/>

      <rect x="300" y="0" width="250" height="120" rx="18" fill="#ffffff" fill-opacity="0.75" stroke="#94a3b8" stroke-opacity="0.45"/>
      <rect x="320" y="20" width="78" height="78" rx="14" fill="url(#g2)" fill-opacity="0.55"/>
      <rect x="412" y="28" width="110" height="10" rx="5" fill="#334155" fill-opacity="0.55"/>
      <rect x="412" y="52" width="92" height="10" rx="5" fill="#334155" fill-opacity="0.35"/>
      <rect x="412" y="76" width="70" height="10" rx="5" fill="#334155" fill-opacity="0.28"/>
    </g>

    <!-- selection rings (appear) -->
    <g transform="translate(210 192)" opacity="0">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#2563eb" stroke-width="6" stroke-opacity="0.85"/>
      <path d="M-10 0 L-2 9 L14 -12" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.18;0.62;1" dur="5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(510 192)" opacity="0">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#2563eb" stroke-width="6" stroke-opacity="0.85"/>
      <path d="M-10 0 L-2 9 L14 -12" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.26;0.62;1" dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- vote button (pulse) -->
    <g transform="translate(640 250)">
      <rect x="0" y="0" width="220" height="54" rx="16" fill="#2563eb" fill-opacity="0.80"/>
      <rect x="12" y="12" width="196" height="30" rx="14" fill="#ffffff" fill-opacity="0.22"/>
      <circle cx="200" cy="27" r="7" fill="#ffffff" fill-opacity="0.65"/>
      <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.03;1" keyTimes="0;0.55;1" dur="1.6s" repeatCount="indefinite"/>
    </g>

    <!-- arrow -->
    <g transform="translate(420 250)" opacity="0">
      <path d="M0 0 C40 0 60 0 100 0" fill="none" stroke="#334155" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>
      <path d="M100 0 l-16 -10 m16 10 l-16 10" fill="none" stroke="#334155" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.28;0.36;0.70;1" dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- coupon appears -->
    <g transform="translate(640 120)" opacity="0">
      <path d="M0 30 a18 18 0 0 1 18 -18 h220 a18 18 0 0 1 18 18 v90 a18 18 0 0 1 -18 18 h-220 a18 18 0 0 1 -18 -18 z"
            fill="#ffffff" fill-opacity="0.80" stroke="#94a3b8" stroke-opacity="0.50"/>
      <path d="M48 12 v126" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="3" stroke-dasharray="7 7"/>
      <circle cx="48" cy="30" r="10" fill="#e2e8f0" fill-opacity="0.9"/>
      <circle cx="48" cy="120" r="10" fill="#e2e8f0" fill-opacity="0.9"/>
      <rect x="70" y="32" width="150" height="12" rx="6" fill="#0f172a" fill-opacity="0.55"/>
      <rect x="70" y="58" width="120" height="10" rx="5" fill="#0f172a" fill-opacity="0.30"/>
      <rect x="70" y="80" width="175" height="10" rx="5" fill="#0f172a" fill-opacity="0.26"/>
      <rect x="70" y="102" width="150" height="10" rx="5" fill="#0f172a" fill-opacity="0.22"/>
      <rect x="70" y="122" width="110" height="10" rx="5" fill="#0f172a" fill-opacity="0.18"/>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.40;0.55;0.88;1" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 12;0 0;0 0;0 12" keyTimes="0;0.55;0.88;1" dur="5s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>

