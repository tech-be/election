<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="g" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 400) rotate(90) scale(520)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#EAF4FF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="rim" x1="256" y1="200" x2="768" y2="824" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#BFD7FF" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="inner" x="168" y="168" width="688" height="688" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="b" in2="SourceAlpha" operator="in" result="bi"/>
      <feColorMatrix in="bi" type="matrix" values="0 0 0 0 0.12  0 0 0 0 0.25  0 0 0 0 0.45  0 0 0 0.18 0"/>
      <feBlend in2="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="shine" x1="340" y1="260" x2="660" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.0"/>
    </linearGradient>
    <!-- light through the opening (right side + wedge reads as “beyond”) -->
    <linearGradient id="openingLight" x1="420" y1="508" x2="640" y2="508" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#EAF4FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="512" cy="500" r="320" fill="url(#g)"/>
    <circle cx="512" cy="500" r="320" fill="url(#shine)"/>
    <circle cx="512" cy="500" r="319" stroke="url(#rim)" stroke-width="10" opacity="0.9"/>
    <circle cx="512" cy="500" r="304" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2"/>
  </g>

  <!--
    開いたドア：左辺は蝶番で垂直、右辺は手前に開いた台形＝「開いている」が一目で分かる構図
    線色 #475569 は step1–4 と同一
  -->
  <g filter="url(#inner)" stroke="#475569" stroke-linecap="round" stroke-linejoin="round">
    <!-- 開口部の奥の光（台形＝ドアの斜めの裏側） -->
    <path
      d="M536 332 L632 328 L632 688 L552 670 Z"
      fill="url(#openingLight)"
      stroke="none"
    />
    <!-- 奥の光を少し強調（柔らかい円） -->
    <ellipse cx="598" cy="508" rx="72" ry="140" fill="#FFFFFF" fill-opacity="0.22" stroke="none"/>

    <!-- ドア本体（左蝶番・右前に開いたパネル） -->
    <path
      d="M392 328 L392 688 L552 670 L536 332 Z"
      fill="rgba(255,255,255,0.24)"
      stroke="#475569"
      stroke-width="18"
    />
    <!-- パネル割 -->
    <path d="M415 418h130M415 508h124" fill="none" stroke="#475569" stroke-width="14" opacity="0.55"/>
    <!-- ノブ（開いて手前に出た側） -->
    <circle cx="528" cy="508" r="15" fill="rgba(255,255,255,0.28)" stroke="#475569" stroke-width="13"/>

    <!-- 開口の枠（上・右・下。左はドアの蝶番でつながり一本に見える） -->
    <path d="M392 328h240M632 328v360M392 688h240" fill="none" stroke="#475569" stroke-width="18" opacity="0.92"/>
    <!-- 外側の額縁ライン -->
    <path d="M378 318h268M646 328v372M378 702h268" fill="none" stroke="#475569" stroke-width="13" opacity="0.42"/>
  </g>
</svg>
