    <path d="M420 470h168"/>
    <path d="M420 534h140"/>
    <path d="M420 598h120"/>
    <path d="M612 540 720 432c14-14 37-14 51 0s14 37 0 51L663 591"/>
    <path d="M612 540 585 647l106-27"/>
