services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-funsite}
      POSTGRES_USER: ${POSTGRES_USER:-funsite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-funsite}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-funsite}}
      # CORS must include your HTTPS origin(s)
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
    ports:
      - "8001:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      # Public URL that browsers use (must be https://your-domain)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
      # Internal URL used by server components/actions inside the container network
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://backend:8000}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:

