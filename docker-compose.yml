services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: funsite
      POSTGRES_USER: funsite
      POSTGRES_PASSWORD: funsite
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://funsite:funsite@db:5432/funsite
      CORS_ORIGINS: http://localhost:3001
      ADMIN_PASSWORD: admin
    ports:
      - "8001:8000"
    volumes:
      - ./data/uploads:/data/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
      API_INTERNAL_BASE_URL: http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend
